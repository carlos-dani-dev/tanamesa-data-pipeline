services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    container_name: tanamesa_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: ${PG_DATA}
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d
      - postgres_data:${PG_DATA}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tanamesa_network

  api:
    build: .
    container_name: tanamesa_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/src/data
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tanamesa_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: tanamesa_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN4_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN4_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tanamesa_network

volumes:
  postgres_data:

networks:
  tanamesa_network:
    driver: bridge